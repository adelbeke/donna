<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donna — web version deprecated</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --text: #1f2328;
        --muted: #59636e;
        --accent: #0969da;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --text: #e6edf3;
          --muted: #8b949e;
          --accent: #58a6ff;
        }
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      main {
        text-align: center;
        max-width: 28rem;
        padding: 2rem;
      }
      img {
        width: 40px;
        height: 40px;
        margin-bottom: 1rem;
      }
      p {
        color: var(--muted);
        line-height: 1.5;
      }
      a {
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="favicon.svg" alt="" />
      <h1>Donna's web version is no longer maintained</h1>
      <p>
        The web version of Donna is no longer maintained. Please download the latest release to keep
        using Donna as a native macOS app.
      </p>
      <p>
        <a href="https://github.com/adelbeke/donna/releases/latest"
          >Download the latest release →</a
        >
      </p>
    </main>
  </body>
</html>
