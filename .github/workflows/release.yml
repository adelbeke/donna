name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump'
        required: true
        type: choice
        options: [patch, minor, major]

jobs:
  bump:
    if: github.actor == 'adelbeke'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.v.outputs.version }}
      branch: ${{ steps.v.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - name: Bump version
        id: v
        run: |
          git config user.email "${{ secrets.GIT_USER_EMAIL }}"
          git config user.name "${{ secrets.GIT_USER_NAME }}"
          npm version ${{ inputs.version_type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          BRANCH="release/v$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH"
          git add package.json package-lock.json
          git commit -m "chore: release v$VERSION"
          git push origin "$BRANCH"

  build:
    needs: bump
    if: github.actor == 'adelbeke'
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.branch }}
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm install
      - run: npx electron-vite build
      - run: npx electron-builder --mac --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: |
            release/*.dmg
            release/*.blockmap
          retention-days: 1

  release:
    needs: [bump, build]
    if: github.actor == 'adelbeke'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push tag
        run: |
          git config user.email "${{ secrets.GIT_USER_EMAIL }}"
          git config user.name "${{ secrets.GIT_USER_NAME }}"
          git tag "v${{ needs.bump.outputs.version }}"
          git push origin "v${{ needs.bump.outputs.version }}"
      - uses: actions/download-artifact@v4
        with:
          pattern: release-mac
          merge-multiple: true
          path: artifacts
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^v${{ needs.bump.outputs.version }}$" | head -1)
          echo "Previous tag: $PREV_TAG"

          get_entries() {
            local prefix="$1"
            git log --pretty=format:"%s" "${PREV_TAG}..HEAD" \
              | grep "^${prefix}:" \
              | sed "s/^${prefix}: //" \
              | sed 's/ (#[0-9]*)//' \
              | sed 's/^/- /'
          }

          FEATURES=$(get_entries "feat")
          FIXES=$(get_entries "fix")
          DOCS=$(get_entries "docs")

          BODY=""
          if [ -n "$FEATURES" ]; then
            BODY="${BODY}### Features\n${FEATURES}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}### Bug Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$DOCS" ]; then
            BODY="${BODY}### Documentation\n${DOCS}\n\n"
          fi

          printf "%b" "$BODY" > /tmp/changelog.md
          cat /tmp/changelog.md
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump.outputs.version }}
          name: v${{ needs.bump.outputs.version }}
          body_path: /tmp/changelog.md
          target_commitish: main
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    needs: [bump, build, release]
    if: failure() && needs.bump.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Delete release branch
        run: git push origin --delete "${{ needs.bump.outputs.branch }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr:
    needs: [bump, release]
    if: github.actor == 'adelbeke'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create PR
        run: |
          gh pr create \
            --title "chore: release v${{ needs.bump.outputs.version }}" \
            --body "Merge version bump for v${{ needs.bump.outputs.version }} (released)." \
            --base main \
            --head "${{ needs.bump.outputs.branch }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
